# ─────────────────────────────────────────────────────────────────────────────
# CI pipeline — VaptCRM SaaS multi-tenant
#
# Arquitetura:
#   4 jobs paralelos → tempo total estimado < 3 minutos.
#   Todos os jobs usam .env.ci (commitado, sem segredos).
#   Nenhum job depende de serviços externos.
#
# Garantias de segurança:
#   • WhatsApp NUNCA dispara (WHATSAPP_ENABLED=false + sem credenciais reais)
#   • Stripe NUNCA processa (placeholders sem prefixo válido)
#   • Queue=sync: jobs rodam inline, sem worker persistente
#   • SQLite :memory: — banco efêmero, isolado por runner
#
# Required status checks (nomes exatos para branch protection):
#   • CI / Lint PHP
#   • CI / Validate Laravel
#   • CI / Tests
#   • CI / Build Frontend
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Cancela runs anteriores do mesmo PR para economizar minutos de CI
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. LINT PHP
  #    Laravel Pint com --test = dry-run.
  #    Exit code != 0 se houver qualquer violação de estilo → merge bloqueado.
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint PHP
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2
          coverage: none
          # Sem extensões desnecessárias — lint não precisa de DB
          ini-values: memory_limit=256M

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Instalar dependências PHP
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Lint com Laravel Pint (dry-run)
        run: ./vendor/bin/pint --test

  # ──────────────────────────────────────────────────────────────────────────
  # 2. VALIDATE LARAVEL
  #    Verifica que o bootstrap completo não tem erros:
  #    config, autoload, service providers, routes, e migrations.
  #
  #    Por que migrate aqui e não só nos testes?
  #    Uma migration quebrada pode fazer os testes pularem silenciosamente
  #    com RefreshDatabase. Esta etapa valida isso explicitamente.
  # ──────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate Laravel
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo_sqlite, sqlite3
          tools: composer:v2
          coverage: none
          ini-values: memory_limit=256M

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Instalar dependências PHP
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Preparar .env de CI
        run: |
          cp .env.ci .env
          php artisan key:generate --force

      - name: Validar config (cache detecta erros de sintaxe nos providers)
        run: |
          php artisan config:cache
          php artisan config:clear

      - name: Validar autoload e bootstrap (artisan about)
        run: php artisan about --only=environment

      - name: Validar rotas carregam sem erro
        run: php artisan route:list --compact > /dev/null

      - name: Validar migrations executam sem erro
        # Cria ficheiro SQLite temporário (não :memory: pois artisan migrate
        # não aceita :memory: via linha de comando, somente via phpunit.xml)
        run: |
          touch /tmp/ci_validate.sqlite
          DB_DATABASE=/tmp/ci_validate.sqlite php artisan migrate --force
          rm -f /tmp/ci_validate.sqlite

  # ──────────────────────────────────────────────────────────────────────────
  # 3. TESTS
  #    Suite completa. phpunit.xml já define SQLite :memory:.
  #    Inclui TenantIsolationTest que é BLOQUEADOR de merge.
  #
  #    Proteções ativas:
  #    • WHATSAPP_ENABLED=false — nenhuma mensagem real pode sair
  #    • QUEUE_CONNECTION=sync  — jobs rodam inline, sem efeitos assíncronos
  #    • MAIL_MAILER=array      — emails são swallowed
  #    • Sem credenciais Stripe — qualquer chamada real falha (correto)
  #
  #    Se um teste chamar a API WhatsApp sem mock → falha por ausência
  #    de credenciais → CORRETO. Protege contra regressão no módulo.
  # ──────────────────────────────────────────────────────────────────────────
  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo_sqlite, sqlite3
          tools: composer:v2
          coverage: none
          ini-values: memory_limit=512M

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Instalar dependências PHP
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Preparar .env de CI
        run: |
          cp .env.ci .env
          php artisan key:generate --force

      # Limpa cache de config para garantir que phpunit.xml prevalece
      - name: Limpar cache de configuração
        run: php artisan config:clear

      - name: Executar testes
        run: php artisan test --stop-on-failure

  # ──────────────────────────────────────────────────────────────────────────
  # 4. BUILD FRONTEND
  #    Vite + Tailwind + Stripe.js devem compilar sem erros.
  #    npm ci é determinístico (usa package-lock.json) — sem surpresas.
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências Node
        run: npm ci

      - name: Build Vite
        run: npm run build
